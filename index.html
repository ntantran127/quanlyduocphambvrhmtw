<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>TNT Innovate — Quản lý dược phẩm BVRHMTW</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#0F6E56;--green2:#085041;--green-bg:#E1F5EE;--green-bd:#5DCAA5;
  --red:#A32D2D;--red-bg:#FCEBEB;--red-bd:#F09595;
  --amber:#854F0B;--amb-bg:#FAEEDA;--amb-bd:#FAC775;
  --blue:#185FA5;--blu-bg:#E6F1FB;--blu-bd:#85B7EB;
  --purple:#3C3489;--pur-bg:#EEEDFE;--pur-bd:#AFA9EC;
  --bg:#F5F4F1;--white:#FFFFFF;--border:#E2DED6;--border2:#CBC8BF;
  --text:#1A1917;--muted:#6B6860;--faint:#9E9B94;
  --sans:'Be Vietnam Pro',sans-serif;--mono:'JetBrains Mono',monospace;
  --r-sm:6px;--r-md:10px;--r-lg:14px;
}
html,body{height:100%;font-family:var(--sans);font-size:13px;color:var(--text);background:var(--bg)}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}

/* ─── LAYOUT ─── */
.app{display:flex;height:100vh}
.sidebar{width:220px;background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* ─── SIDEBAR ─── */
.s-logo{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.s-logo-mark{width:32px;height:32px;background:none;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.s-logo-mark svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.s-logo-text{font-size:13px;font-weight:600;line-height:1.2}
.s-logo-text span{display:block;font-size:11px;font-weight:400;color:var(--muted)}
.s-section{padding:12px 12px 4px;font-size:10px;font-weight:600;color:var(--faint);letter-spacing:.08em;text-transform:uppercase}
.s-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:var(--r-sm);cursor:pointer;font-size:13px;color:var(--muted);margin:1px 6px;transition:background .12s,color .12s;position:relative}
.s-item:hover{background:var(--bg);color:var(--text)}
.s-item.active{background:var(--green-bg);color:var(--green);font-weight:500}
.s-item svg{width:16px;height:16px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.s-badge{margin-left:auto;background:var(--red);color:#fff;border-radius:99px;font-size:10px;font-weight:600;padding:1px 6px;font-family:var(--mono);animation:pulse 1.8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
.s-user{padding:12px 14px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;margin-top:auto}
.s-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.s-user-info{flex:1;min-width:0}
.s-user-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.s-user-role{font-size:11px;color:var(--faint)}
.icon-btn{width:26px;height:26px;border-radius:var(--r-sm);border:1px solid var(--border);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:background .12s}
.icon-btn:hover{background:var(--bg)}
.icon-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* ─── TOPBAR ─── */
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.topbar-title{font-size:15px;font-weight:600;flex:1}
.chip{font-size:11px;padding:3px 10px;border-radius:99px;background:var(--bg);border:1px solid var(--border);color:var(--muted);font-family:var(--mono)}

/* ─── CONTENT ─── */
.content{flex:1;overflow-y:auto;padding:18px 20px}

/* ─── BUTTON ─── */
.btn{padding:7px 14px;border-radius:var(--r-sm);font-size:12px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-family:var(--sans);transition:background .12s}
.btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.btn-p{background:var(--green);color:#fff;border:none}.btn-p:hover{background:var(--green2)}
.btn-g{background:none;border:1px solid var(--border2);color:var(--muted)}.btn-g:hover{background:var(--bg)}
.btn-r{background:none;border:1px solid var(--red-bd);color:var(--red)}.btn-r:hover{background:var(--red-bg)}
.btn-export{background:#1A4A8A;color:#fff;border:none}.btn-export:hover{background:#143A6E}

/* ─── CARD ─── */
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);margin-bottom:14px}
.card-hd{padding:11px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-hd h3{font-size:13px;font-weight:600;display:flex;align-items:center;gap:7px}
.card-hd h3 svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* ─── STAT CARDS ─── */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);padding:13px 16px}
.stat-label{font-size:11px;color:var(--muted);margin-bottom:5px;display:flex;align-items:center;gap:5px}
.stat-label svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.stat-val{font-size:22px;font-weight:600;font-family:var(--mono);line-height:1}
.stat-sub{font-size:11px;color:var(--faint);margin-top:3px}

/* ─── BADGE ─── */
.bdg{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:500;border:1px solid}
.bdg-r{background:var(--red-bg);color:var(--red);border-color:var(--red-bd)}
.bdg-a{background:var(--amb-bg);color:var(--amber);border-color:var(--amb-bd)}
.bdg-g{background:var(--green-bg);color:var(--green);border-color:var(--green-bd)}
.bdg-b{background:var(--blu-bg);color:var(--blue);border-color:var(--blu-bd)}
.bdg-p{background:var(--pur-bg);color:var(--purple);border-color:var(--pur-bd)}

/* ─── TABLE ─── */
.tbl-wrap{overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
th{padding:8px 12px;text-align:left;font-size:10px;font-weight:600;color:var(--faint);background:#F8F7F4;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
td{padding:8px 12px;border-bottom:1px solid var(--border);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#FAFAF8}
tr.tr-expired td{background:#FEF5F5}
tr.tr-expired:hover td{background:var(--red-bg)}
tr.tr-warn td{background:#FFFCF5}
tr.tr-warn:hover td{background:var(--amb-bg)}
.mono{font-family:var(--mono)}

/* ─── FORM ─── */
.fg{display:flex;flex-direction:column;gap:3px;margin-bottom:10px}
.fg label{font-size:11px;font-weight:500;color:var(--muted)}
.fg input,.fg select,.fg textarea{font-size:13px;padding:7px 10px;border:1px solid var(--border2);border-radius:var(--r-sm);background:var(--white);color:var(--text);font-family:var(--sans);outline:none;transition:border-color .15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--green)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fa{display:flex;gap:8px;justify-content:flex-end;padding-top:10px;border-top:1px solid var(--border);margin-top:4px}

/* ─── MODAL ─── */
.overlay{display:none;position:absolute;inset:0;background:rgba(0,0,0,.35);align-items:center;justify-content:center;z-index:50}
.overlay.open{display:flex}
.modal{background:var(--white);border-radius:var(--r-lg);padding:22px;width:460px;max-width:95%;border:1px solid var(--border)}
.modal h3{font-size:14px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.modal h3 svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* ─── ALERT BANNER ─── */
.alert-bar{display:flex;align-items:flex-start;gap:10px;padding:11px 16px;border-radius:var(--r-md);border-left:3px solid;margin-bottom:12px;font-size:12px;line-height:1.6}
.alert-bar svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;margin-top:1px}
.ab-red{background:var(--red-bg);border-color:var(--red);color:#791F1F}
.ab-amber{background:var(--amb-bg);border-color:#E67E22;color:#7A4008}

/* ─── ROLE TOGGLE ─── */
.role-opt{flex:1;padding:9px;border:1px solid var(--border);border-radius:var(--r-sm);cursor:pointer;text-align:center;font-size:12px;transition:all .12s}
.role-opt svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;display:block;margin:0 auto 4px}
.ro-admin{background:var(--pur-bg);border-color:var(--pur-bd);color:var(--purple);font-weight:500}
.ro-staff{background:var(--blu-bg);border-color:var(--blu-bd);color:var(--blue);font-weight:500}

/* ─── DEPT CHECK ─── */
.dc{display:flex;align-items:center;gap:6px;padding:7px 9px;border:1px solid var(--border);border-radius:var(--r-sm);cursor:pointer;font-size:12px;transition:all .12s}
.dc:hover{background:var(--bg)}
.dc.on{background:var(--green-bg);border-color:var(--green-bd);color:var(--green)}

/* ─── PROGRESS ─── */
.pbar{height:5px;background:var(--bg);border-radius:99px;overflow:hidden;margin-top:4px}
.pfill{height:100%;border-radius:99px;transition:width .3s}

/* ─── TOAST ─── */
.toast{position:absolute;bottom:16px;right:16px;color:#fff;padding:8px 14px;border-radius:var(--r-sm);font-size:12px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:100;font-weight:500}
.toast.show{opacity:1}

/* ─── LOGIN / REGISTER ─── */
.auth-page{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)}
.auth-box{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);padding:28px;width:360px}
.auth-logo{text-align:center;margin-bottom:20px}
.auth-logo-mark{width:72px;height:72px;background:none;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 10px}
.auth-logo-mark svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.auth-title{font-size:16px;font-weight:600}
.auth-sub{font-size:12px;color:var(--muted);margin-top:2px}
.ql-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:14px}
.ql-btn{padding:8px 5px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--bg);cursor:pointer;text-align:center;transition:all .12s;font-family:var(--sans)}
.ql-btn:hover{border-color:var(--border2)}
.ql-btn.is-admin{background:var(--pur-bg);border-color:var(--pur-bd)}
.ql-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;display:block;margin:0 auto 4px}
.ql-btn .qn{font-size:12px;font-weight:500;color:var(--text)}
.ql-btn .qr{font-size:10px;color:var(--muted)}
.divider{display:flex;align-items:center;gap:8px;margin:12px 0;font-size:11px;color:var(--faint)}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.auth-link{font-size:12px;text-align:center;color:var(--muted);margin-top:12px;cursor:pointer}
.auth-link a{color:var(--green);font-weight:500;text-decoration:none}
.auth-link a:hover{text-decoration:underline}

/* ─── DEPT CARD (dashboard) ─── */
.dept-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.dept-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);padding:13px;cursor:pointer;transition:border-color .15s}
.dept-card:hover{border-color:var(--border2)}
.dept-card.has-exp{border-color:var(--amb-bd)}
.dept-card.has-over{border-color:var(--red-bd)}
.dept-ic{width:30px;height:30px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;font-size:15px;margin-bottom:9px}
.dept-ic svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* ─── WH HEADER ROW ─── */
.wh-head{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;background:#F8F7F4;border-bottom:1px solid var(--border)}
.wh-name-row{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:500}
.wh-name-row svg{width:14px;height:14px;stroke:var(--muted);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* ─── NOTICE ─── */
.notice{display:flex;align-items:center;gap:8px;padding:9px 14px;border-radius:var(--r-md);font-size:12px;margin-bottom:12px}
.notice svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.n-amber{background:var(--amb-bg);color:var(--amber)}
.n-red{background:var(--red-bg);color:var(--red)}

/* ─── ALARM ANIMATIONS ─── */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
@keyframes shake{0%,100%{transform:translateX(0)}15%{transform:translateX(-5px)}30%{transform:translateX(5px)}45%{transform:translateX(-4px)}60%{transform:translateX(4px)}75%{transform:translateX(-2px)}90%{transform:translateX(2px)}}
@keyframes blink-red{0%,100%{background:#A32D2D;box-shadow:0 0 0 0 rgba(163,45,45,.5)}50%{background:#C0392B;box-shadow:0 0 0 8px rgba(163,45,45,0)}}
@keyframes blink-border{0%,100%{border-color:var(--red-bd)}50%{border-color:#C0392B;box-shadow:0 0 0 3px rgba(163,45,45,.2)}}
@keyframes fadeInDown{from{opacity:0;transform:translateY(-18px)}to{opacity:1;transform:translateY(0)}}
@keyframes siren{0%,100%{background:#A32D2D}50%{background:#E24B4A}}

/* ─── ALERT POPUP (login modal) ─── */
.alert-popup-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:flex;align-items:center;justify-content:center}
.alert-popup{background:var(--white);border-radius:var(--r-lg);width:460px;max-width:95vw;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.3);animation:fadeInDown .3s ease}
.alert-popup-head{padding:18px 20px;display:flex;align-items:center;gap:12px}
.alert-popup-head svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.alert-popup-head h2{font-size:15px;font-weight:700;color:#fff;flex:1}
.alert-popup-head .close-x{background:rgba(255,255,255,.2);border:none;width:26px;height:26px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
.alert-popup-head .close-x svg{width:14px;height:14px}
.alert-popup-body{padding:16px 20px 6px}
.alarm-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:var(--r-sm);margin-bottom:8px;border:1px solid}
.alarm-item .ai-icon{width:32px;height:32px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.alarm-item .ai-icon svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.alarm-item .ai-text .ai-name{font-size:12px;font-weight:600}
.alarm-item .ai-text .ai-detail{font-size:11px;margin-top:1px;line-height:1.4}
.alarm-item-exp{background:#FEF3F3;border-color:#F5B8B8}
.alarm-item-warn{background:#FEF9EE;border-color:#F5DFA0}
.alarm-item-low{background:#EDF4FC;border-color:#A8CCEF}
.alert-popup-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}

/* ─── SIDEBAR ALARM BADGE ─── */
.s-badge-alarm{margin-left:auto;background:var(--red);color:#fff;border-radius:99px;font-size:10px;font-weight:700;padding:2px 7px;font-family:var(--mono);animation:blink-red 1.4s infinite;box-shadow:0 0 0 3px rgba(163,45,45,.25)}
.s-badge-warn{margin-left:auto;background:#E67E22;color:#fff;border-radius:99px;font-size:10px;font-weight:700;padding:2px 7px;font-family:var(--mono);animation:pulse 1.8s infinite}

/* ─── ALERT BANNER (dashboard) ─── */
.alarm-banner{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:var(--r-md);margin-bottom:10px;animation:fadeInDown .3s ease;border:1.5px solid}
.alarm-banner svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.alarm-banner .ab-content{flex:1;min-width:0}
.alarm-banner .ab-title{font-size:13px;font-weight:700}
.alarm-banner .ab-sub{font-size:11px;margin-top:2px;opacity:.85}
.ab-red{background:#FEF0F0;border-color:#E88080;color:#7A1414;animation:blink-border 2s infinite}
.ab-orange{background:#FEF6EC;border-color:#F5C97A;color:#7A4C08}
.alarm-icon-spin{animation:shake 1.2s ease infinite}

/* ─── EXPIRY PAGE REDESIGN ─── */
.exp-hero{border-radius:var(--r-lg);overflow:hidden;margin-bottom:14px}
.exp-hero-head{padding:16px 20px;display:flex;align-items:center;gap:12px}
.exp-hero-head svg{width:24px;height:24px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.exp-hero-head h2{font-size:15px;font-weight:700;color:#fff;flex:1}
.exp-stat-row{display:grid;grid-template-columns:repeat(4,1fr)}
.exp-stat-cell{padding:14px 18px;border-right:1px solid rgba(255,255,255,.15);display:flex;flex-direction:column;gap:3px}
.exp-stat-cell:last-child{border-right:none}
.exp-stat-cell .esc-val{font-size:28px;font-weight:800;font-family:var(--mono);color:#fff;line-height:1}
.exp-stat-cell .esc-label{font-size:11px;color:rgba(255,255,255,.8);font-weight:500}
.exp-stat-cell .esc-sub{font-size:10px;color:rgba(255,255,255,.6)}

/* ─── ALARM CARD ─── */
.alarm-card{border-radius:var(--r-lg);overflow:hidden;margin-bottom:12px;border:1.5px solid}
.alarm-card-head{padding:11px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.alarm-card-head h3{font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px;color:#fff}
.alarm-card-head h3 svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.alarm-card-body{background:var(--white)}
.ac-expired{border-color:#C0392B;animation:blink-border 2s infinite}
.ac-expired .alarm-card-head{background:#C0392B;animation:siren 1.6s infinite}
.ac-critical{border-color:#E67E22}
.ac-critical .alarm-card-head{background:#E67E22}
.ac-warn30{border-color:#BA7517}
.ac-warn30 .alarm-card-head{background:#BA7517}
.ac-warn90{border-color:var(--blue)}
.ac-warn90 .alarm-card-head{background:var(--blue)}

/* ─── CONFIRM DIALOG ─── */
.confirm-box{background:var(--white);border-radius:var(--r-lg);padding:22px;width:380px;max-width:95%;border:1px solid var(--border);box-shadow:0 8px 32px rgba(0,0,0,.12)}
.confirm-box h4{font-size:14px;font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.confirm-box h4 svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.confirm-box p{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:16px}
.confirm-box .cf-actions{display:flex;gap:8px;justify-content:flex-end}
/* ─── DEPT MANAGE ROW ─── */
.dm-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);transition:background .1s}
.dm-row:last-child{border-bottom:none}
.dm-row:hover{background:var(--bg)}
.dm-icon{width:32px;height:32px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dm-icon svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
/* ─── COLOR PICKER ─── */
.cp-grid{display:flex;gap:7px;flex-wrap:wrap;margin-top:5px}
.cp-dot{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .12s,transform .12s}
.cp-dot:hover{transform:scale(1.15)}
.cp-dot.sel{border-color:var(--text);transform:scale(1.15)}

.rpt-sum{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.rpt-cell{border-radius:var(--r-md);padding:12px 14px;border:1px solid}
.rpt-cell .rc-label{font-size:11px;font-weight:500;margin-bottom:4px}
.rpt-cell .rc-val{font-size:24px;font-weight:700;font-family:var(--mono);line-height:1}
.rpt-cell .rc-sub{font-size:11px;margin-top:2px;opacity:.8}
</style>
</head>

let CU = null, CV = '';

function gd(id){ return DEPTS.find(d=>d.id===id)||{n:'—',c:'#888',bg:'#eee',ic:'pthuoc'} }
function daysTo(ds){ return Math.floor((new Date(ds)-TODAY)/86400000) }
function expLevel(ds){
  const d=daysTo(ds);
  if(d<0) return 3; if(d<=7) return 2; if(d<=30) return 1; if(d<=90) return 0; return -1;
}
function expTag(ds){
  const d=daysTo(ds), lv=expLevel(ds);
  if(lv===3) return `<span class="bdg bdg-r">Quá hạn ${Math.abs(d)}n</span>`;
  if(lv===2) return `<span class="bdg bdg-r">Còn ${d} ngày</span>`;
  if(lv===1) return `<span class="bdg bdg-a">Còn ${d} ngày</span>`;
  if(lv===0) return `<span class="bdg bdg-b">Còn ${d} ngày</span>`;
  return `<span class="bdg bdg-g">Còn hạn</span>`;
}
function stockTag(qty,base){
  const p=base>0?qty/base:1;
  if(p<0.3) return `<span class="bdg bdg-r">Rất thấp</span>`;
  if(p<0.6) return `<span class="bdg bdg-a">Thấp</span>`;
  return `<span class="bdg bdg-g">Đủ</span>`;
}
function fmtDate(ds){ const [y,m,d]=ds.split('-'); return `${d}/${m}/${y}` }
function myDepts(){ return CU.role==='admin'?DEPTS:DEPTS.filter(d=>CU.depts.includes(d.id)) }
function allItems(deptList){
  const r=[];
  deptList.forEach(dep=>{(WH[dep.id]||[]).forEach(w=>{w.items.forEach(it=>r.push({...it,dept:dep,whName:w.name,whId:w.id}))});});
  return r;
}
function alertCounts(){
  const items=allItems(myDepts());
  return {
    expired:  items.filter(x=>expLevel(x.date)===3).length,
    critical: items.filter(x=>expLevel(x.date)===2).length,
    warn:     items.filter(x=>expLevel(x.date)===1).length,
    lowStock: items.filter(x=>x.base>0&&x.qty/x.base<0.3).length,
  };
}

function addRDeptTag(){
  const inp=document.getElementById('r-dept-inp'); if(!inp) return;
  const val=inp.value.trim(); if(!val) return;
  const found=DEPTS.find(d=>d.n.toLowerCase()===val.toLowerCase());
  if(found){if(!rSelDepts.includes(found.id))rSelDepts.push(found.id);}
  else{
    const newId='custom_r_'+Date.now();
    const colors=['#185FA5','#993C1D','#534AB7','#0F6E56','#854F0B','#3B6D11'];
    const c=colors[DEPTS.length%colors.length];
    DEPTS.push({id:newId,n:val,c,bg:c+'22',ic:'pthuoc'});
    DEPT_IC[newId]=DEPT_IC['pthuoc']; WH[newId]=[];
    rSelDepts.push(newId);
  }
  inp.value=''; document.getElementById('r-dept-sug').style.display='none';
  renderRDeptTags(); buildRegDepts();
}
function doRegister(){
  const name=(document.getElementById('r-name').value||'').trim();
  const uname=(document.getElementById('r-user').value||'').trim();
  const pw=document.getElementById('r-pw').value;
  const pw2=document.getElementById('r-pw2').value;
  const err=document.getElementById('r-err');
  err.style.color='var(--red)';
  if(!name||!uname||!pw){ err.textContent='Vui lòng điền đủ thông tin'; return }
  if(pw!==pw2){ err.textContent='Mật khẩu xác nhận không khớp'; return }
  if(rSelDepts.length===0){ err.textContent='Vui lòng chọn ít nhất 1 khoa / phòng'; return }
  if(users.find(u=>u.uname===uname)){ err.textContent='Tên đăng nhập đã tồn tại'; return }
  users.push({id:nextUid++,name,uname,pass:pw,role:'staff',depts:[...rSelDepts],active:true});
  err.style.color='var(--green)'; err.textContent='Đăng ký thành công! Đang chuyển về đăng nhập...';
  setTimeout(()=>{ err.textContent=''; buildQL(); showPage('pg-login'); },1500);
}

      ${ws.map(w=>{
        const over=w.items.filter(it=>expLevel(it.date)===3).length;
        const warn=w.items.filter(it=>expLevel(it.date)>=1&&expLevel(it.date)<=2).length;

              <button class="btn btn-g" style="font-size:11px;padding:4px 9px" onclick="openAddItem('${d.id}',${w.id})">

              <button class="icon-btn" onclick="openEditWH('${d.id}',${w.id})" title="Đổi tên kho">
                <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              </button>
              <button class="icon-btn" style="border-color:var(--red-bd);color:var(--red)" onclick="delWH('${d.id}',${w.id})" title="Xóa kho">
                <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
              </button>
            </div>
          </div>
          ${w.items.length?`<div class="tbl-wrap"><table>
            <thead><tr>
              <th style="width:26%">Tên thuốc</th>
              <th style="width:10%">Số lượng</th>
              <th style="width:10%">Cơ số</th>
              <th style="width:9%">Đơn vị</th>
              <th style="width:13%">Hạn dùng</th>
              <th style="width:13%">Hạn</th>
              <th style="width:11%">Tồn kho</th>
              <th style="width:8%"></th>
            </tr></thead>
            <tbody>
              ${w.items.map(it=>{
                const lv=expLevel(it.date);
                const rc=lv===3?'tr-expired':lv>=1?'tr-warn':'';
                const pct=it.base>0?Math.min(100,Math.round(it.qty/it.base*100)):100;
                const pc=it.base>0&&it.qty/it.base<0.3?'#E24B4A':it.base>0&&it.qty/it.base<0.6?'#EF9F27':'#1D9E75';
                return`<tr class="${rc}">
                  <td style="font-weight:500">${it.name}</td>
                  <td class="mono">${it.qty}</td>
                  <td class="mono" style="color:var(--muted)">${it.base}</td>
                  <td style="color:var(--muted)">${it.unit}</td>
                  <td class="mono">${fmtDate(it.date)}</td>
                  <td>${expTag(it.date)}</td>
                  <td>
                    <div style="font-size:11px;color:var(--muted)">${pct}%</div>
                    <div class="pbar"><div class="pfill" style="width:${pct}%;background:${pc}"></div></div>
                  </td>
                  <td>
                    <div style="display:flex;gap:4px">
                      <button class="icon-btn" onclick="openEditItem('${d.id}',${w.id},${it.id})" title="Sửa">
                        <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                      </button>
                      <button class="icon-btn" style="border-color:var(--red-bd);color:var(--red)" onclick="delItem('${d.id}',${w.id},${it.id})" title="Xóa">
                        <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
                      </button>
                    </div>
                  </td>
                </tr>`;
              }).join('')}
            </tbody>
          </table></div>`:
          '<div style="padding:10px 16px;font-size:12px;color:var(--faint)">Chưa có thuốc trong kho này.</div>'}
        </div>`;
      }).join('')}
    </div>`;
  });
  mc.innerHTML += html + '<div id="toast" class="toast"></div>';
  mc.innerHTML += '<div id="ov" class="overlay" onclick="closeOv(event)"></div>';
}

function openAddWH(dId){ whModal={dId,wid:null,mode:'add'}; showOv(`
  <div class="modal"><h3><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>Thêm kho mới — ${gd(dId).n}</h3>
    <div class="fg"><label>Tên kho *</label><input id="mf-wn" type="text" placeholder="VD: Kho thuốc tiêm"/></div>
    <div class="fa"><button class="btn btn-g" onclick="closeOv()">Hủy</button><button class="btn btn-p" onclick="saveWH()"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Lưu kho</button></div>
  </div>`);
  setTimeout(()=>{const i=document.getElementById('mf-wn');if(i)i.focus()},50);
}
function openEditWH(dId,wid){ 
  const w=(WH[dId]||[]).find(x=>x.id===wid); if(!w) return;
  whModal={dId,wid,mode:'edit'}; showOv(`
  <div class="modal"><h3><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Đổi tên kho</h3>
    <div class="fg"><label>Tên kho *</label><input id="mf-wn" type="text" value="${w.name}"/></div>
    <div class="fa"><button class="btn btn-g" onclick="closeOv()">Hủy</button><button class="btn btn-p" onclick="saveWH()"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Cập nhật</button></div>
  </div>`);
}
function saveWH(){
  const name=(document.getElementById('mf-wn').value||'').trim();
  if(!name){toast('Vui lòng nhập tên kho!',true);return}
  if(!WH[whModal.dId]) WH[whModal.dId]=[];
  if(whModal.mode==='add'){ WH[whModal.dId].push({id:nextWid++,name,items:[]}); toast('Đã thêm kho: '+name); }
  else{ const w=WH[whModal.dId].find(x=>x.id===whModal.wid); if(w) w.name=name; toast('Đã cập nhật tên kho'); }
  closeOv(); setView('warehouse');
}
function delWH(dId,wid){
  const w=(WH[dId]||[]).find(x=>x.id===wid);
  WH[dId]=(WH[dId]||[]).filter(x=>x.id!==wid);
  toast('Đã xóa kho: '+(w?w.name:'')); buildSidebar(); setView('warehouse');
}

function openAddItem(dId,wid){ itModal={dId,wid,iid:null}; showItemForm() }
function openEditItem(dId,wid,iid){
  itModal={dId,wid,iid};
  const w=(WH[dId]||[]).find(x=>x.id===wid); const it=w&&w.items.find(x=>x.id===iid);
  if(!it) return; showItemForm(it);
}
function showItemForm(it=null){ showOv(`
  <div class="modal"><h3><svg viewBox="0 0 24 24"><path d="M10.5 20H4a2 2 0 0 1-2-2V5c0-1.1.9-2 2-2h3.93a2 2 0 0 1 1.66.9l.82 1.2a2 2 0 0 0 1.66.9H20a2 2 0 0 1 2 2v3"/><circle cx="17" cy="17" r="3"/></svg>${it?'Chỉnh sửa thuốc':'Thêm thuốc vào kho'}</h3>
    <div class="fg"><label>Tên thuốc *</label><input id="mi-n" type="text" value="${it?it.name:''}" placeholder="VD: Paracetamol 500mg"/></div>
    <div class="frow">
      <div class="fg"><label>Số lượng hiện có *</label><input id="mi-q" type="number" min="0" value="${it?it.qty:''}" placeholder="0"/></div>
      <div class="fg"><label>Cơ số tối thiểu *</label><input id="mi-b" type="number" min="0" value="${it?it.base:''}" placeholder="0"/></div>
    </div>
    <div class="frow">
      <div class="fg"><label>Đơn vị *</label><select id="mi-u">${['Viên','Hộp','Lọ','Ống','Bút','Chai','Gói','Cái'].map(u=>`<option${it&&it.unit===u?' selected':''}>${u}</option>`).join('')}</select></div>
      <div class="fg"><label>Hạn sử dụng *</label><input id="mi-d" type="date" value="${it?it.date:''}"/></div>
    </div>
    <div class="fa"><button class="btn btn-g" onclick="closeOv()">Hủy</button><button class="btn btn-p" onclick="saveItem()"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>${it?'Cập nhật':'Thêm thuốc'}</button></div>
  </div>`);
  setTimeout(()=>{const i=document.getElementById('mi-n');if(i)i.focus()},50);
}
function saveItem(){
  const name=(document.getElementById('mi-n').value||'').trim();
  const qty=parseInt(document.getElementById('mi-q').value)||0;
  const base=parseInt(document.getElementById('mi-b').value)||0;
  const unit=document.getElementById('mi-u').value;
  const date=document.getElementById('mi-d').value;
  if(!name||!date){toast('Vui lòng điền đủ thông tin!',true);return}
  if(!WH[itModal.dId]) WH[itModal.dId]=[];
  const w=WH[itModal.dId].find(x=>x.id===itModal.wid); if(!w) return;
  if(!itModal.iid){ w.items.push({id:nextIid++,name,qty,base,unit,date}); toast('Đã thêm: '+name); }
  else{ const it=w.items.find(x=>x.id===itModal.iid); if(it) Object.assign(it,{name,qty,base,unit,date}); toast('Đã cập nhật: '+name); }
  closeOv(); buildSidebar(); setView('warehouse');
}
function delItem(dId,wid,iid){
  const w=(WH[dId]||[]).find(x=>x.id===wid); if(!w) return;
  const it=w.items.find(x=>x.id===iid);
  w.items=w.items.filter(x=>x.id!==iid);
  toast('Đã xóa: '+(it?it.name:'')); buildSidebar(); setView('warehouse');
}

// ── EXPIRY (alarm redesign) ──
function vExpiry(mc){
  const items=allItems(myDepts()).sort((a,b)=>daysTo(a.date)-daysTo(b.date));
  const expired  = items.filter(x=>expLevel(x.date)===3);
  const critical = items.filter(x=>expLevel(x.date)===2);
  const warn30   = items.filter(x=>expLevel(x.date)===1);
  const warn90   = items.filter(x=>expLevel(x.date)===0);

  function tbl(list, showAction){
    if(!list.length) return '<div style="padding:14px 16px;font-size:12px;color:var(--faint);text-align:center">Không có mặt hàng nào</div>';
    return `<div class="tbl-wrap"><table>
      <thead><tr>
        <th style="width:26%">Tên thuốc</th>
        <th style="width:19%">Khoa / Kho</th>
        <th style="width:9%">Số lượng</th>
        <th style="width:8%">ĐV</th>
        <th style="width:13%">Hạn dùng</th>
        <th style="width:14%">Tình trạng</th>
        <th style="width:11%">${showAction?'Xử lý':''}</th>
      </tr></thead>
      <tbody>${list.map(it=>{
        const lv=expLevel(it.date), d=daysTo(it.date);
        const rc=lv===3?'tr-expired':lv>=1?'tr-warn':'';
        return`<tr class="${rc}">
          <td style="font-weight:500">${it.name}</td>
          <td><div style="font-size:12px;color:${it.dept.c};font-weight:500">${it.dept.n}</div><div style="font-size:10px;color:var(--faint)">${it.whName}</div></td>
          <td class="mono">${it.qty}</td>
          <td style="color:var(--muted)">${it.unit}</td>
          <td class="mono" style="font-weight:500">${fmtDate(it.date)}</td>
          <td>${lv===3
            ?`<span class="bdg bdg-r" style="animation:pulse 1.4s infinite">🔴 Quá ${Math.abs(d)} ngày</span>`
            :lv===2?`<span class="bdg bdg-r">⚠ Còn ${d} ngày</span>`
            :lv===1?`<span class="bdg bdg-a">⏱ Còn ${d} ngày</span>`
            :`<span class="bdg bdg-b">Còn ${d} ngày</span>`}
          </td>
          <td>${showAction?`<button class="btn btn-r" style="font-size:11px;padding:3px 9px;white-space:nowrap" onclick="removeItem('${it.dept.id}',${it.whId},${it.id})">
            <svg viewBox="0 0 24 24" style="width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>Huỷ lô</button>`:''}</td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>`;
  }

  function alarmSection(cls, title, icon, list, showAction){
    if(!list.length) return '';
    return `<div class="alarm-card ${cls}">
      <div class="alarm-card-head">
        <h3>${icon}${title}</h3>
        <span style="background:rgba(255,255,255,.25);color:#fff;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:700;font-family:var(--mono)">${list.length} mặt hàng</span>
      </div>
      <div class="alarm-card-body">${tbl(list, showAction)}</div>
    </div>`;
  }

  const heroColor = expired.length ? '#C0392B' : critical.length ? '#E67E22' : warn30.length ? '#BA7517' : '#185FA5';
  const heroBg    = expired.length ? 'linear-gradient(135deg,#A32D2D,#C0392B)' : critical.length ? 'linear-gradient(135deg,#B7570A,#E67E22)' : warn30.length ? 'linear-gradient(135deg,#9A5A09,#BA7517)' : 'linear-gradient(135deg,#185FA5,#2176D2)';
  const heroStatus = expired.length ? '🚨 CÓ THUỐC QUÁ HẠN' : critical.length ? '⚠ CẢNH BÁO KHẨN CẤP' : warn30.length ? '⏱ THEO DÕI SÁT' : '✅ THEO DÕI ĐỊNH KỲ';

  mc.innerHTML += `
    <div class="exp-hero" style="background:${heroBg};border:1.5px solid ${heroColor}88;${expired.length?'animation:blink-border 2s infinite':''}">
      <div class="exp-hero-head">
        <svg class="${expired.length||critical.length?'alarm-icon-spin':''}" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <h2>Cảnh báo hạn dùng thuốc</h2>
        <span style="background:rgba(255,255,255,.2);color:#fff;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600">${heroStatus}</span>
      </div>
      <div class="exp-stat-row" style="border-top:1px solid rgba(255,255,255,.15)">
        ${[
          [expired.length,'Đã quá hạn','cần huỷ ngay'],
          [critical.length,'Hết hạn ≤7 ngày','ưu tiên cao'],
          [warn30.length,'Hết hạn ≤30 ngày','theo dõi sát'],
          [warn90.length,'Hết hạn ≤90 ngày','lên kế hoạch'],
        ].map(([v,l,s])=>`<div class="exp-stat-cell">
          <div class="esc-val">${v}</div>
          <div class="esc-label">${l}</div>
          <div class="esc-sub">${s}</div>
        </div>`).join('')}
      </div>
    </div>
    ${alarmSection('ac-expired',
      'Đã quá hạn sử dụng — huỷ lô ngay lập tức',
      '<svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;animation:alarm-icon-spin 1s infinite"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
      expired, true)}
    ${alarmSection('ac-critical',
      'Hết hạn trong 7 ngày — ưu tiên xử lý',
      '<svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
      critical, false)}
    ${alarmSection('ac-warn30',
      'Hết hạn trong 30 ngày — theo dõi sát',
      '<svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>',
      warn30, false)}
    ${alarmSection('ac-warn90',
      'Hết hạn trong 90 ngày — lên kế hoạch',
      '<svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>',
      warn90, false)}
    ${!items.length?`<div style="text-align:center;padding:48px 20px;background:var(--white);border-radius:var(--r-lg);border:1px solid var(--border)">
      <div style="font-size:48px;margin-bottom:10px">✅</div>
      <div style="font-size:15px;font-weight:600;color:var(--green)">Tất cả thuốc đều còn hạn sử dụng</div>
      <div style="font-size:12px;color:var(--muted);margin-top:4px">Không có cảnh báo nào cần xử lý</div>
    </div>`:''}
    <div id="toast" class="toast"></div>`;
}

function removeItem(dId,wid,iid){
  const w=(WH[dId]||[]).find(x=>x.id===wid); if(!w) return;
  const it=w.items.find(x=>x.id===iid);
  w.items=w.items.filter(x=>x.id!==iid);
  toast('Đã huỷ lô: '+(it?it.name:'')); buildSidebar(); setView('expiry');
}

function doExportHTML(){
  const depts=myDepts();

          Nhân viên y tế<div style="font-size:10px;opacity:.75;margin-top:2px">Chỉ xem khoa mình</div>

          <div style="position:relative;flex:1">
            <input id="uf-dept-input" type="text" placeholder="Nhập tên khoa hoặc chọn từ danh sách bên dưới..." style="width:100%;padding-right:32px"
              oninput="filterDeptSuggest()" onkeydown="deptInputKey(event)" autocomplete="off"/>
            <div id="uf-dept-suggest" style="display:none;position:absolute;top:100%;left:0;right:0;background:var(--white);border:1px solid var(--border2);border-radius:var(--r-sm);box-shadow:0 4px 16px rgba(0,0,0,.1);z-index:10;max-height:160px;overflow-y:auto;margin-top:2px"></div>

function renderDeptTags(){
  const el=document.getElementById('uf-dept-tags'); if(!el) return;
  if(!uSelDepts.length){
    el.innerHTML='<span style="font-size:11px;color:var(--faint)">Chưa có khoa nào được chọn</span>';
    return;
  }
  el.innerHTML=uSelDepts.map(id=>{
    const d=gd(id);
    return`<span style="display:inline-flex;align-items:center;gap:5px;padding:3px 8px 3px 10px;border-radius:99px;background:${d.bg};border:1px solid ${d.c}44;font-size:12px;color:${d.c};font-weight:500">
      ${d.n}
      <button onclick="removeDeptTag('${id}')" style="background:none;border:none;cursor:pointer;color:${d.c};padding:0;display:flex;align-items:center;opacity:.7;line-height:1" title="Xóa khoa này">
        <svg viewBox="0 0 24 24" style="width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </span>`;
  }).join('');
}

function removeDeptTag(id){
  uSelDepts=uSelDepts.filter(x=>x!==id);
  renderDeptTags();
}

function quickAddDept(id){
  if(!uSelDepts.includes(id)){ uSelDepts.push(id); renderDeptTags(); }
  else { toast('Khoa này đã được thêm rồi!',true); }
}

function filterDeptSuggest(){
  const q=(document.getElementById('uf-dept-input').value||'').toLowerCase().trim();
  const box=document.getElementById('uf-dept-suggest'); if(!box) return;
  if(!q){box.style.display='none';return;}
  const matches=DEPTS.filter(d=>d.n.toLowerCase().includes(q)&&!uSelDepts.includes(d.id));
  if(!matches.length){
    box.innerHTML=`<div style="padding:8px 12px;font-size:12px;color:var(--faint)">Không tìm thấy — nhấn Thêm để tạo khoa mới "<strong>${document.getElementById('uf-dept-input').value}</strong>"</div>`;
  } else {
    box.innerHTML=matches.map(d=>`<div onclick="selectSuggest('${d.id}')" style="display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;font-size:12px;transition:background .1s" onmouseover="this.style.background='var(--bg)'" onmouseout="this.style.background=''">
      <span style="width:8px;height:8px;border-radius:50%;background:${d.c};flex-shrink:0"></span>${d.n}
    </div>`).join('');
  }
  box.style.display='block';
}

function selectSuggest(id){
  if(!uSelDepts.includes(id)) uSelDepts.push(id);
  document.getElementById('uf-dept-input').value='';
  document.getElementById('uf-dept-suggest').style.display='none';
  renderDeptTags();
}

function deptInputKey(e){
  if(e.key==='Enter'){e.preventDefault();addDeptTag();}
  if(e.key==='Escape') document.getElementById('uf-dept-suggest').style.display='none';
}

function addDeptTag(){
  const inp=document.getElementById('uf-dept-input'); if(!inp) return;
  const val=inp.value.trim(); if(!val) return;
  // Check if matches existing dept name
  const found=DEPTS.find(d=>d.n.toLowerCase()===val.toLowerCase());
  if(found){
    if(!uSelDepts.includes(found.id)) uSelDepts.push(found.id);
    inp.value='';
    document.getElementById('uf-dept-suggest').style.display='none';
    renderDeptTags(); return;
  }
  // Create new dept on the fly
  const newId='custom_'+Date.now();
  const colors=['#185FA5','#993C1D','#534AB7','#0F6E56','#854F0B','#3B6D11'];
  const c=colors[DEPTS.length%colors.length];
  DEPTS.push({id:newId,n:val,c,bg:c+'22',ic:'pthuoc'});
  DEPT_IC[newId]=DEPT_IC['pthuoc'];
  WH[newId]=[];
  uSelDepts.push(newId);
  inp.value='';
  document.getElementById('uf-dept-suggest').style.display='none';
  renderDeptTags();
  toast('Đã tạo khoa mới: '+val);
  // rebuild quick-add buttons
  const qrow=document.querySelector('#uf-dept-sec .fg > div:last-child');
  if(qrow) qrow.innerHTML=DEPTS.map(d=>`<button onclick="quickAddDept('${d.id}')" title="Chọn nhanh ${d.n}" style="padding:3px 9px;border-radius:99px;border:1px solid var(--border);background:var(--bg);font-size:11px;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:var(--sans);color:var(--muted);transition:all .12s" onmouseover="this.style.background='${d.bg}';this.style.color='${d.c}';this.style.borderColor='${d.c}44'" onmouseout="this.style.background='var(--bg)';this.style.color='var(--muted)';this.style.borderColor='var(--border)'">
    <span style="width:7px;height:7px;border-radius:50%;background:${d.c};display:inline-block;flex-shrink:0"></span>${d.n}
  </button>`).join('');
}

function setUR(r){
  uSelRole=r;
  ['a','s'].forEach(x=>{
    const el=document.getElementById('ro-'+x); if(!el) return;
    el.className='role-opt'+(x==='a'&&r==='admin'?' ro-admin':x==='s'&&r==='staff'?' ro-staff':'');
  });
  const ds=document.getElementById('uf-dept-sec'); if(ds) ds.style.display=r==='admin'?'none':'';
}

function closeUF(){ const p=document.getElementById('uf-panel'); if(p) p.style.display='none'; }
// close suggest when clicking outside
document.addEventListener('click',function(e){
  const box=document.getElementById('uf-dept-suggest');
  if(box&&!box.contains(e.target)&&e.target.id!=='uf-dept-input') box.style.display='none';
});
function saveU(){
  const name=(document.getElementById('uf-n').value||'').trim();
  const uname=(document.getElementById('uf-u').value||'').trim();
  const pw=document.getElementById('uf-p').value;
  if(!name||!uname){toast('Vui lòng điền đủ thông tin!',true);return}
  if(!uEditId&&!pw){toast('Vui lòng nhập mật khẩu!',true);return}
  if(uSelRole==='staff'&&!uSelDepts.length){toast('Chọn ít nhất 1 khoa!',true);return}
  if(users.find(u=>u.uname===uname&&u.id!==uEditId)){toast('Tên đăng nhập đã tồn tại!',true);return}
  if(uEditId){ const i=users.findIndex(x=>x.id===uEditId); if(i>=0){users[i]={...users[i],name,uname,role:uSelRole,depts:uSelRole==='admin'?[]:uSelDepts};if(pw)users[i].pass=pw;} toast('Đã cập nhật'); }
  else { users.push({id:nextUid++,name,uname,pass:pw,role:uSelRole,depts:uSelRole==='admin'?[]:uSelDepts,active:true}); toast('Đã thêm người dùng mới'); }
  closeUF(); renderUList(); buildQL(); buildSidebar();
}
function toggleUA(id){
  if(id===CU.id){toast('Không thể khóa tài khoản đang dùng!',true);return}
  const u=users.find(x=>x.id===id); if(!u) return;
  u.active=!u.active; toast(u.active?'Đã mở khóa':'Đã khóa tài khoản'); renderUList();
}
function delUser(id){
  if(id===CU.id){toast('Không thể xóa tài khoản đang dùng!',true);return}
  const u=users.find(x=>x.id===id); if(!u) return;
  showConfirm(
    'Xác nhận xóa tài khoản',
    `Bạn có chắc muốn xóa tài khoản <strong>${u.name}</strong> (${u.uname})? Hành động này không thể hoàn tác.`,
    'var(--red)',
    ()=>{ users=users.filter(x=>x.id!==id); toast('Đã xóa: '+u.name); renderUList(); buildQL(); buildSidebar(); }
  );
}

// ── DEPARTMENTS MANAGEMENT ──
const DEPT_COLORS = ['#185FA5','#993C1D','#534AB7','#A32D2D','#993556','#0F6E56','#854F0B','#3B6D11','#1D7874','#6B4C11','#2E4057','#7B2D8B'];
let DEPTS_EDITABLE = [...DEPTS]; // mutable copy
let dEditId = null, dSelColor = '#185FA5';

function vDepts(mc){
  mc.innerHTML += `
    <div id="df-panel" style="display:none;margin-bottom:12px"></div>
    <div class="card">
      <div class="card-hd">
        <h3>
          <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Danh sách khoa / phòng
          <span class="bdg bdg-b" style="font-size:11px" id="dept-count"></span>
        </h3>
        <button class="btn btn-p" onclick="openDF()">
          <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Thêm khoa mới
        </button>
      </div>
      <div id="dept-list"></div>
    </div>
    <div id="toast" class="toast"></div>
    <div id="ov" class="overlay" onclick="closeOv(event)"></div>`;
  renderDeptList();
}

function renderDeptList(){
  const el=document.getElementById('dept-list'); if(!el) return;
  const cnt=document.getElementById('dept-count'); if(cnt) cnt.textContent=DEPTS.length+' khoa';
  if(!DEPTS.length){
    el.innerHTML='<div style="padding:20px;text-align:center;color:var(--faint);font-size:12px">Chưa có khoa / phòng nào. Nhấn "Thêm khoa mới".</div>';
    return;
  }
  el.innerHTML=DEPTS.map(d=>{
    const staffCount=users.filter(u=>u.depts&&u.depts.includes(d.id)).length;
    const whCount=(WH[d.id]||[]).length;
    const itemCount=(WH[d.id]||[]).reduce((s,w)=>s+w.items.length,0);
    return`<div class="dm-row">
      <div class="dm-icon" style="background:${d.bg};color:${d.c}">${DEPT_IC[d.ic]||''}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:500">${d.n}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:1px">
          <span class="bdg bdg-b" style="font-size:10px;padding:1px 6px">${staffCount} nhân viên</span>
          &nbsp;
          <span class="bdg bdg-g" style="font-size:10px;padding:1px 6px">${whCount} kho · ${itemCount} thuốc</span>
        </div>
      </div>
      <div style="font-family:var(--mono);font-size:11px;color:var(--faint);margin-right:8px">${d.id}</div>
      <div style="display:flex;gap:5px">
        <button class="icon-btn" onclick="openDF('${d.id}')" title="Sửa">
          <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="icon-btn" style="border-color:var(--red-bd);color:var(--red)" onclick="confirmDelDept('${d.id}')" title="Xóa khoa">
          <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        </button>
      </div>
    </div>`;
  }).join('');
}

function openDF(did=null){
  dEditId=did;
  const d=did?DEPTS.find(x=>x.id===did):null;
  dSelColor=d?d.c:'#185FA5';
  const p=document.getElementById('df-panel'); p.style.display='block';
  p.innerHTML=`<div class="card">
    <div class="card-hd">
      <h3>${did?'Chỉnh sửa khoa / phòng':'Thêm khoa / phòng mới'}</h3>
      <button class="icon-btn" onclick="closeDF()">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div style="padding:14px">
      <div class="frow">
        <div class="fg"><label>Tên khoa / phòng *</label><input id="df-n" type="text" value="${d?d.n:''}" placeholder="VD: Khoa Da liễu"/></div>
        <div class="fg"><label>Mã ID *${did?' <span style="font-size:10px;color:var(--faint)">(không thay đổi được)</span>':''}</label>
          <input id="df-id" type="text" value="${d?d.id:''}" placeholder="VD: daliieu" ${did?'disabled style="background:var(--bg);color:var(--faint)"':''}/>
        </div>
      </div>
      <div class="fg">
        <label>Màu đại diện</label>
        <div class="cp-grid" id="cp-grid">
          ${DEPT_COLORS.map(c=>`<div class="cp-dot${c===dSelColor?' sel':''}" style="background:${c}" onclick="pickDC('${c}')"></div>`).join('')}
        </div>
      </div>
      <div style="margin-top:6px;padding:10px 12px;background:var(--bg);border-radius:var(--r-sm);display:flex;align-items:center;gap:10px">
        <div id="df-preview" style="width:32px;height:32px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;background:${d?d.bg:dSelColor+'22'};color:${dSelColor}">
          <svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        </div>
        <span id="df-preview-name" style="font-size:13px;font-weight:500;color:${dSelColor}">${d?d.n:'Tên khoa'}</span>
      </div>
      <div class="fa">
        <button class="btn btn-g" onclick="closeDF()">Hủy</button>
        <button class="btn btn-p" onclick="saveDept()">
          <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>${did?'Cập nhật':'Thêm khoa'}
        </button>
      </div>
    </div>
  </div>`;
  document.getElementById('df-n').addEventListener('input',function(){
    const pn=document.getElementById('df-preview-name'); if(pn) pn.textContent=this.value||'Tên khoa';
  });
}

function pickDC(c){
  dSelColor=c;
  document.querySelectorAll('.cp-dot').forEach(el=>{ el.classList.toggle('sel', el.style.background===c||el.getAttribute('style').includes(c)); });
  const prev=document.getElementById('df-preview'); if(prev){ prev.style.background=c+'22'; prev.style.color=c; }
  const pn=document.getElementById('df-preview-name'); if(pn) pn.style.color=c;
}

function closeDF(){ const p=document.getElementById('df-panel'); if(p) p.style.display='none'; }

function saveDept(){
  const name=(document.getElementById('df-n').value||'').trim();
  const rawId=(document.getElementById('df-id').value||'').trim().toLowerCase().replace(/\s+/g,'').replace(/[^a-z0-9]/g,'');
  if(!name){toast('Vui lòng nhập tên khoa!',true);return}
  if(!dEditId&&!rawId){toast('Vui lòng nhập mã ID!',true);return}
  if(!dEditId&&DEPTS.find(d=>d.id===rawId)){toast('Mã ID đã tồn tại!',true);return}
  const bg=dSelColor+'22', c=dSelColor;
  if(dEditId){
    const i=DEPTS.findIndex(x=>x.id===dEditId);
    if(i>=0){ DEPTS[i]={...DEPTS[i],n:name,c,bg}; }
    toast('Đã cập nhật: '+name);
  } else {
    DEPTS.push({id:rawId,n:name,c,bg,ic:'pthuoc'});
    DEPT_IC[rawId]=DEPT_IC['pthuoc'];
    WH[rawId]=[];
  }
  closeDF(); renderDeptList(); buildSidebar();
  // refresh register dept grid
  buildRegDepts();
}

function confirmDelDept(did){
  const d=DEPTS.find(x=>x.id===did); if(!d) return;
  const staffCount=users.filter(u=>u.depts&&u.depts.includes(did)).length;
  const whCount=(WH[did]||[]).length;
  const itemCount=(WH[did]||[]).reduce((s,w)=>s+w.items.length,0);
  const hasData=staffCount>0||whCount>0;
  showConfirm(
    'Xác nhận xóa khoa / phòng',
    `Bạn có chắc muốn xóa <strong>${d.n}</strong>?${hasData?`<br><br><span style="color:var(--red)">⚠ Lưu ý: khoa này còn <strong>${staffCount} nhân viên</strong> và <strong>${itemCount} mặt hàng trong ${whCount} kho</strong>. Tất cả dữ liệu kho sẽ bị xóa theo.</span>`:'<br>Hành động này không thể hoàn tác.'}`,
    'var(--red)',
    ()=>{
      const idx=DEPTS.findIndex(x=>x.id===did);
      if(idx>=0) DEPTS.splice(idx,1);
      delete WH[did];
      users.forEach(u=>{ u.depts=u.depts.filter(x=>x!==did); });
      toast('Đã xóa khoa: '+d.n);
      renderDeptList(); buildSidebar(); buildRegDepts();
    }
  );
}

// ─── SHARED CONFIRM DIALOG ───
function showConfirm(title, msgHtml, color, onConfirm){
  showOv(`<div class="confirm-box">
    <h4 style="color:${color}">
      <svg viewBox="0 0 24 24" style="color:${color}"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      ${title}
    </h4>
    <p>${msgHtml}</p>
    <div class="cf-actions">
      <button class="btn btn-g" onclick="closeOv()">Hủy</button>
      <button class="btn" style="background:${color};color:#fff;border:none" onclick="doConfirm()">Xác nhận xóa</button>
    </div>
  </div>`);
  window._confirmCb = onConfirm;
}
function doConfirm(){ if(window._confirmCb) window._confirmCb(); window._confirmCb=null; closeOv(); }


// ═══════════════ MODAL OVERLAY ═══════════════
function showOv(html){
  let ov=document.getElementById('ov');
  if(!ov){ ov=document.createElement('div'); ov.id='ov'; ov.className='overlay'; document.getElementById('mc').appendChild(ov); }
  ov.innerHTML=html; ov.className='overlay open';
  ov.onclick=e=>{ if(e.target===ov) closeOv(); };
}
function closeOv(){ const ov=document.getElementById('ov'); if(ov) ov.className='overlay'; }

// ═══════════════ TOAST ═══════════════
let tT;
function toast(msg,err=false){
  let t=document.getElementById('toast');
  if(!t){ t=document.createElement('div'); t.id='toast'; t.className='toast'; document.getElementById('mc').appendChild(t); }
  t.textContent=msg; t.style.background=err?'var(--red)':'var(--green)';
  t.classList.add('show'); clearTimeout(tT); tT=setTimeout(()=>t.classList.remove('show'),2400);
}

// ═══════════════ ALARM POPUP ═══════════════
function showAlarmPopup(){
  const al=alertCounts();
  const allExp=allItems(myDepts()).filter(x=>expLevel(x.date)>=2).sort((a,b)=>daysTo(a.date)-daysTo(b.date));
  if(!allExp.length) return; // nothing urgent
  const isRed=al.expired>0||al.critical>0;
  const headBg=isRed?'linear-gradient(135deg,#A32D2D,#C0392B)':'linear-gradient(135deg,#B7570A,#E67E22)';
  const title=isRed?'🚨 Cảnh báo khẩn — Thuốc hết hạn!':'⚠ Cảnh báo hạn dùng thuốc';
  const show=allExp.slice(0,5);
  const popup=document.createElement('div');
  popup.className='alert-popup-bg'; popup.id='alarm-popup';
  popup.innerHTML=`<div class="alert-popup">
    <div class="alert-popup-head" style="background:${headBg};${isRed?'animation:siren 1.6s infinite':''}">
      <svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      <h2>${title}</h2>
      <button class="close-x" onclick="closeAlarmPopup()">
        <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="alert-popup-body">
      <div style="font-size:12px;color:var(--muted);margin-bottom:10px">Hệ thống phát hiện <strong style="color:var(--red)">${al.expired} thuốc đã quá hạn</strong> và <strong style="color:var(--amber)">${al.critical} thuốc hết hạn trong 7 ngày</strong>.</div>
      ${show.map(it=>{
        const lv=expLevel(it.date), d=daysTo(it.date);
        const isExp=lv===3;
        return`<div class="alarm-item ${isExp?'alarm-item-exp':lv===2?'alarm-item-exp':'alarm-item-warn'}">
          <div class="ai-icon" style="background:${isExp?'#FCEBEB':'#FAEEDA'};color:${isExp?'#A32D2D':'#854F0B'}">
            <svg viewBox="0 0 24 24">${isExp?'<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>':'<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>'}</svg>
          </div>
          <div class="ai-text" style="flex:1;min-width:0">
            <div class="ai-name" style="color:${isExp?'var(--red)':'var(--amber)'}">${it.name}</div>
            <div class="ai-detail" style="color:var(--muted)">${it.dept.n} · ${it.whName} · Hạn: ${fmtDate(it.date)}</div>
          </div>
          <span class="bdg ${isExp?'bdg-r':'bdg-a'}" style="flex-shrink:0;${isExp?'animation:pulse 1.4s infinite':''}">
            ${isExp?`Quá ${Math.abs(d)} ngày`:`Còn ${d} ngày`}
          </span>
        </div>`;
      }).join('')}
      ${allExp.length>5?`<div style="text-align:center;font-size:12px;color:var(--muted);padding:8px 0">...và ${allExp.length-5} mặt hàng khác</div>`:''}
    </div>
    <div class="alert-popup-footer">
      <button class="btn btn-g" onclick="closeAlarmPopup()">Bỏ qua</button>
      <button class="btn btn-p" onclick="closeAlarmPopup();setView('expiry')">
        <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Xem tất cả cảnh báo
      </button>
    </div>
  </div>`;
  document.body.appendChild(popup);
  popup.onclick=e=>{if(e.target===popup)closeAlarmPopup();};
  // play alarm sound (web audio)
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    function beep(freq,start,dur){
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value=freq; o.type='square';
      g.gain.setValueAtTime(0,ctx.currentTime+start);
      g.gain.linearRampToValueAtTime(isRed?0.12:0.07,ctx.currentTime+start+0.02);
      g.gain.linearRampToValueAtTime(0,ctx.currentTime+start+dur);
      o.start(ctx.currentTime+start); o.stop(ctx.currentTime+start+dur+0.05);
    }
    if(isRed){beep(880,0,.12);beep(660,.18,.12);beep(880,.36,.12);beep(660,.54,.12);}
    else{beep(660,0,.12);beep(880,.2,.12);}
  }catch(e){}
}
function closeAlarmPopup(){
  const p=document.getElementById('alarm-popup'); if(p) p.remove();
}

// ═══════════════ INIT ═══════════════
buildQL();
buildRegDepts();
</script>
